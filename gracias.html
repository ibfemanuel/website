<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias | IBF Emanuel</title>

    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A2540, #133b63);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .thank-you-container {
            max-width: 600px;
            padding: 40px;
        }

        .thank-you-container h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        .thank-you-container p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 25px;
            background-color: #d4af37;
            color: #0A2540;
            text-decoration: none;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn-home:hover {
            background-color: #f0c94d;
        }
    </style>
</head>
<body>

    <div class="thank-you-container">
        <h1>¡Gracias por su mensaje!</h1>
        <p>Este mensaje es para confirmar que hemos recibido su mensaje. Nos pondremos en contacto con usted lo mas antes posible.</p>
        <p>¡Dios Te Bendiga!</p>

        <a href="index.html" class="btn-home">Volver al inicio</a>
    </div>

</body>
</html>
