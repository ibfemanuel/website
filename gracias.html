<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por su mensaje</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d3b66;
            color: white;
        }

        .gracias-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .gracias-box h1 {
            font-size: 3rem;
            margin-bottom: 25px;
            color: white;
        }

        .gracias-box p {
            font-size: 1.2rem;
            line-height: 1.8;
            max-width: 700px;
            margin: 0 auto 30px auto;
            color: white;
        }

        .gracias-box .bendicion {
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: white;
        }

        .btn-inicio {
            display: inline-block;
            padding: 12px 25px;
            background: #d4af37;
            color: #000;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.3s ease;
        }

        .btn-inicio:hover {
            background: #b8942f;
        }
    </style>
</head>
<body>
    <div class="gracias-container">
        <div class="gracias-box">
            <h1>¡Gracias por su mensaje!</h1>
        <p>Este mensaje es para confirmar que hemos recibido su mensaje. Nos pondremos en contacto con usted lo mas antes posible.</p>
            <p class="bendicion">¡Dios Te Bendiga!</p>
            <a href="index.html" class="btn-inicio">Volver al inicio</a>
        </div>
    </div>
</body>
</html>
